services:
  modelrelay:
    build: .
    container_name: modelrelay
    restart: unless-stopped
    ports:
      - "7352:7352"
    volumes:
      - modelrelay_config:/app/config
    environment:
      - NODE_ENV=production
      - HOME=/app/config
      - HTTP_PROXY
      - HTTPS_PROXY
      - NO_PROXY
    env_file:
      - .env
    proxy:
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      no_proxy: ${NO_PROXY:-}
volumes:
  modelrelay_config:
